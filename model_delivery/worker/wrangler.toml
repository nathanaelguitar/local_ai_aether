name = "canopy-model-delivery"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put <NAME>`):
#   R2_ACCOUNT_ID        - Cloudflare account ID
#   R2_ACCESS_KEY_ID     - R2 S3-API access key (Object Read on this bucket only)
#   R2_SECRET_ACCESS_KEY - R2 S3-API secret key
#   R2_BUCKET_NAME       - R2 bucket name
#   ADMIN_SECRET         - Bearer token for /admin/tokens/revoke
#   CONTRIBUTOR_INGEST_HMAC_SECRET - DGX-only HMAC secret; match local .env
#   CONTRIBUTOR_INGEST_ORIGIN      - Full HTTPS DGX ingest URL

[vars]
ENVIRONMENT = "contributor"

[[d1_databases]]
binding = "DB"
database_name = "canopy-model-delivery"
database_id = "323e849e-54c8-4320-9fed-291286f993d8"

[[r2_buckets]]
binding = "MODEL_BUCKET"
bucket_name = "canopy-model-files"
preview_bucket_name = "canopy-model-delivery-preview"

# Bind the custom hostname through Cloudflare after the Worker is deployed:
#   model-api.canopychat.app/*
# The MCP/API setup must attach this domain to the deployed Worker.
