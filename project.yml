name: AetherChat
options:
  bundleIdPrefix: com.nathanaelguitar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

targets:
  AetherChat:
    type: application
    platform: iOS
    sources:
      - path: AetherChat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nathanaelguitar.aetherchat
      INFOPLIST_FILE: AetherChat/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
