services:
  ingest:
    build:
      context: ..
      dockerfile: contributor_pipeline/Dockerfile
    environment:
      CANOPY_CONTRIBUTOR_HOST: 0.0.0.0
      CANOPY_CONTRIBUTOR_PORT: 8791
      CANOPY_CONTRIBUTOR_ROOT: /data/canopy/contributor_pipeline
      CANOPY_CONTRIBUTOR_SHARED_SECRET: ${CANOPY_CONTRIBUTOR_SHARED_SECRET:?Set CANOPY_CONTRIBUTOR_SHARED_SECRET in the local environment}
      CANOPY_RATE_LIMIT_REQUESTS_PER_MINUTE: ${CANOPY_RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
    volumes:
      - canopy_data:/data/canopy/contributor_pipeline
    networks: [contributor_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8791/ready', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  curator:
    build:
      context: ..
      dockerfile: contributor_pipeline/Dockerfile
    environment:
      CANOPY_CONTRIBUTOR_ROOT: /data/canopy/contributor_pipeline
      CANOPY_REDACTION_THRESHOLD: ${CANOPY_REDACTION_THRESHOLD:-0}
    command:
      - sh
      - -c
      - >-
        while :; do
        python -m canopy_contributor.process;
        sleep "$${CURATOR_INTERVAL_SECONDS:-600}";
        done
    depends_on:
      ingest:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - canopy_data:/data/canopy/contributor_pipeline
    networks: [contributor_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  retention:
    build:
      context: ..
      dockerfile: contributor_pipeline/Dockerfile
    environment:
      CANOPY_CONTRIBUTOR_ROOT: /data/canopy/contributor_pipeline
      CANOPY_RAW_RETENTION_DAYS: ${CANOPY_RAW_RETENTION_DAYS:-30}
      CANOPY_QUARANTINE_RETENTION_DAYS: ${CANOPY_QUARANTINE_RETENTION_DAYS:-7}
      CANOPY_BRONZE_RETENTION_DAYS: ${CANOPY_BRONZE_RETENTION_DAYS:-90}
      CANOPY_SILVER_RETENTION_DAYS: ${CANOPY_SILVER_RETENTION_DAYS:-90}
    command:
      - sh
      - -c
      - >-
        while :; do
        python -m canopy_contributor.cleanup;
        sleep "$${RETENTION_INTERVAL_SECONDS:-86400}";
        done
    depends_on:
      ingest:
        condition: service_healthy
    healthcheck:
      disable: true
    volumes:
      - canopy_data:/data/canopy/contributor_pipeline
    networks: [contributor_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    depends_on:
      ingest:
        condition: service_healthy
    expose: ["8080"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [contributor_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /data
      - /config
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 3s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [tunnel]
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in the local environment}"]
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in the local environment}
      CANOPY_CONTRIBUTOR_DOMAIN: ${CANOPY_CONTRIBUTOR_DOMAIN:-contributor-api.canopychat.app}
    depends_on:
      caddy:
        condition: service_healthy
    networks: [contributor_internal, tunnel_egress]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  contributor_internal:
    internal: true
  tunnel_egress:

volumes:
  canopy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CANOPY_HOST_STORAGE_ROOT:-/data/canopy/contributor_pipeline}
