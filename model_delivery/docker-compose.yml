services:
  delivery:
    build:
      context: ..
      dockerfile: model_delivery/Dockerfile
    environment:
      CANOPY_DELIVERY_HOST: 0.0.0.0
      CANOPY_DELIVERY_PORT: 8792
      CANOPY_DELIVERY_ROOT: /data/canopy/model_delivery
      CANOPY_DELIVERY_R2_ACCOUNT_ID: ${CANOPY_DELIVERY_R2_ACCOUNT_ID:?Set in .env}
      CANOPY_DELIVERY_R2_ACCESS_KEY_ID: ${CANOPY_DELIVERY_R2_ACCESS_KEY_ID:?Set in .env}
      CANOPY_DELIVERY_R2_SECRET_ACCESS_KEY: ${CANOPY_DELIVERY_R2_SECRET_ACCESS_KEY:?Set in .env}
      CANOPY_DELIVERY_R2_BUCKET: ${CANOPY_DELIVERY_R2_BUCKET:?Set in .env}
      CANOPY_DELIVERY_MODEL_FILENAME: ${CANOPY_DELIVERY_MODEL_FILENAME:-canopy-1.1.2.Q4_K_M.gguf}
      CANOPY_DELIVERY_MODEL_VERSION: ${CANOPY_DELIVERY_MODEL_VERSION:-1.1.2}
      CANOPY_DELIVERY_URL_TTL_SECONDS: ${CANOPY_DELIVERY_URL_TTL_SECONDS:-900}
    volumes:
      - delivery_data:/data/canopy/model_delivery
    networks: [delivery_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 256m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; raise SystemExit(0 if urlopen('http://127.0.0.1:8792/ready', timeout=2).status == 200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    depends_on:
      delivery:
        condition: service_healthy
    expose: ["8080"]
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks: [delivery_internal]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp
      - /data
      - /config
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8080/ready"]
      interval: 30s
      timeout: 3s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: [tunnel]
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}"]
    environment:
      CLOUDFLARE_TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    depends_on:
      caddy:
        condition: service_healthy
    networks: [delivery_internal, tunnel_egress]
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: [/tmp]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  delivery_internal:
    internal: true
  tunnel_egress:

volumes:
  delivery_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${CANOPY_DELIVERY_HOST_STORAGE_ROOT:-/data/canopy/model_delivery}
