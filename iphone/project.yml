name: AetherChat
options:
  bundleIdPrefix: com.nathanaelguitar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "6.0"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"

packages:
  LlamaSwift:
    url: https://github.com/mattt/llama.swift.git
    from: 2.9821.0

targets:
  AetherChat:
    type: application
    platform: iOS
    sources:
      - path: AetherChat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nathanaelguitar.aetherchat
      INFOPLIST_FILE: AetherChat/Info.plist
      TARGETED_DEVICE_FAMILY: "1"
      DEVELOPMENT_TEAM: YPHP5T7N84
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      OTHER_LDFLAGS:
        - "$(inherited)"
        - "-lsqlite3"
      AETHER_BETA_TELEMETRY_HMAC_SECRET: ""
    dependencies:
      - package: LlamaSwift
        product: LlamaSwift
    scheme:
      testTargets:
        - AetherChatTests
        - AetherChatUITests

  AetherChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AetherChatTests
    dependencies:
      - target: AetherChat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nathanaelguitar.aetherchat.tests
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AetherChat.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AetherChat"
      BUNDLE_LOADER: "$(TEST_HOST)"

  AetherChatUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AetherChatUITests
    dependencies:
      - target: AetherChat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nathanaelguitar.aetherchat.uitests
      GENERATE_INFOPLIST_FILE: YES
      TEST_TARGET_NAME: AetherChat
